<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub - Agenda de Eventos</title>
  <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>
  <canvas id="particles-bg"></canvas>
  <div class="container">
    <header>
      <nav class="menu">
        <span class="logo-provisoria">EH</span>
        <a href="index.html">Início</a>
        <a href="event-form.html">Cadastrar Evento</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a href="meus-eventos.html">Seus Eventos</a>
        <a href="login.html">Login</a>
        <a href="cadastro.html">Cadastro</a>
      </nav>
      <h1 class="logo">EventHub</h1>
      <p class="subtitle">Descubra e divulgue eventos na sua cidade</p>
    </header>
    <main>
      <!-- Campo de busca -->
      <div style="margin-bottom: 32px;">
        <input type="text" id="search-input" placeholder="🔍 Buscar por evento, cidade ou categoria..." style="width: 100%; padding: 16px; border: 2px solid var(--cor-principal, #00bfff); border-radius: 8px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff); font-size: 16px;">
      </div>

      <!-- Botão para mostrar/esconder filtros -->
      <div style="margin-bottom: 16px;">
        <button id="toggle-filtros" onclick="toggleFiltros()" style="padding: 12px 24px; background: var(--cor-principal, #00bfff); border: none; border-radius: 4px; color: #000; font-weight: 600; cursor: pointer; font-size: 16px;">
          Mostrar Filtros ▼
        </button>
      </div>

      <!-- Filtros rápidos (colapsável) -->
      <div id="filtros-container" style="display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; padding: 20px; background: rgba(0, 191, 255, 0.05); border-radius: 8px;">
        <div>
          <label style="color: #888; font-size: 12px;">Estado</label>
          <select id="filtro-estado" style="width: 100%; padding: 8px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff);">
            <option value="">Todos os estados</option>
          </select>
        </div>
        <div>
          <label style="color: #888; font-size: 12px;">Cidade</label>
          <select id="filtro-cidade" style="width: 100%; padding: 8px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff);">
            <option value="">Todas as cidades</option>
          </select>
        </div>
        <div>
          <label style="color: #888; font-size: 12px;">Categoria</label>
          <select id="filtro-categoria" style="width: 100%; padding: 8px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff);">
            <option value="">Todas as categorias</option>
          </select>
        </div>
        <div>
          <label style="color: #888; font-size: 12px;">Preço Máx (R$)</label>
          <input type="number" id="filtro-preco" placeholder="0" style="width: 100%; padding: 8px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff);">
        </div>
        <div>
          <label style="color: #888; font-size: 12px;">Data (a partir de)</label>
          <input type="date" id="filtro-data" style="width: 100%; padding: 8px; border: 1px solid var(--cor-principal, #00bfff); border-radius: 4px; background: var(--bg-secondary, #1a2332); color: var(--text-color, #fff);">
        </div>
        <div style="display: flex; align-items: flex-end;">
          <button onclick="limparFiltros()" style="width: 100%; padding: 8px; background: var(--cor-principal, #00bfff); border: none; border-radius: 4px; color: #000; font-weight: 600; cursor: pointer;">Limpar Filtros</button>
        </div>
      </div>

      <!-- Seção: Eventos para você -->
      <section id="section-para-voce" style="margin-bottom: 48px;">
        <h2 style="margin-bottom: 24px; color: var(--text-primary, #00bfff);">Eventos para Você</h2>
        <div id="eventos-para-voce" class="event-cards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px;"></div>
        <p id="mensagem-para-voce" style="text-align: center; color: #888; margin-top: 16px;"></p>
      </section>

      <!-- Seção: Todos os eventos -->
      <section id="section-todos">
        <h2 style="margin-bottom: 24px; color: var(--text-primary, #00bfff);">Todos os Eventos</h2>
        <div id="event-cards" class="event-cards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px;"></div>
        <p id="mensagem-eventos" style="text-align: center; color: #888; margin-top: 16px;"></p>
      </section>
    </main>
  </div>

  <!-- Ícone de perfil fixo -->
  <div id="icone-perfil" onclick="irParaPerfil()" title="Meu Perfil">
    <img id="icone-perfil-img" src="" alt="Foto do Perfil">
  </div>

  <script src="particles.js"></script>
  <script src="theme.js"></script>
  <script src="cidades-brasil.js"></script>
  <script src="evento-list.js"></script>
  <script src="global.js"></script>
</body>
</html>
